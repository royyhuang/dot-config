window:
  decorations: buttonless
  padding:
    x: 5
    y: 1

colors:
  # Default colors
  primary:
    background: '0x25363b'
    foreground: '0xb0bec5'

  # Cursor colors
  cursor:
    text:   '0x727272'
    cursor: '0xffcc00'

  # Normal colors
  normal:
    black:   '0x000000'
    red:     '0xdc6068'
    green:   '0xabcf76'
    yellow:  '0xe6b455'
    blue:    '0x6498eb'
    magenta: '0xb480d6'
    cyan:    '0x71c6e7'
    white:   '0xeeffff'

  # Bright colors
  bright:
    black:   '0x415967'
    red:     '0xf07178'
    green:   '0xc3e88d'
    yellow:  '0xffcb6b'
    blue:    '0x82aaff'
    magenta: '0xc792ea'
    cyan:    '0x89ddff'
    white:   '0xeeffff'

  # dim colors
  dim:
    black:   '0x000000'
    red:     '0xdc6068'
    green:   '0xabcf76'
    yellow:  '0xe6b455'
    blue:    '0x6498eb'
    magenta: '0xb480d6'
    cyan:    '0x71c6e7'
    white:   '0xeeffff'

font:
  normal:
    family: JetbrainsMono Nerd Font Mono
    style: Medium

  bold:
    family: JetbrainsMono Nerd Font Mono
    style: Extra Bold

  italic:
    family: JetbrainsMono Nerd Font Mono
    style: Italic

  bold_italic:
    family: JetbrainsMono Nerd Font Mono
    style: Extra Bold Italic

  size: 12

  offset:
    x: 0
    y: 7 
